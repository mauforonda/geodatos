name: Archivar
on:
  schedule:
    - cron: '0 1,7,13,19 * * *'
  workflow_dispatch:

concurrency:
  group: repo-maintenance
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  archive:
    name: archive, commit and push
    runs-on: ubuntu-latest
    timeout-minutes: 330
    env:
      IA_ACCESS_KEY: ${{ secrets.IA_ACCESS_KEY }}
      IA_SECRET_KEY: ${{ secrets.IA_SECRET_KEY }}
      ARCHIVE_COLLECTION: ${{ secrets.ARCHIVE_COLLECTION }}
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: setup python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements.txt
      - name: Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Configurar git
        run: |
          git config --global user.email "geodatos-bot@example.com"
          git config --global user.name "geodatos-bot"
      - name: Sincronizar y archivar incrementalmente
        run: |
          set -euo pipefail

          sync_and_push() {
            git add evaluar/datasets.csv archivar/paquetes.csv archivar/runs.csv archivar/publicados
            if git diff --quiet && git diff --staged --quiet; then
              return 1
            fi
            git commit -m "[archive] $(date '+%Y-%m-%d %H:%M')"
            git pull --rebase "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" master
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:master
            return 0
          }

          start=$(date +%s)
          deadline=$((start + 300 * 60))

          while [ "$(date +%s)" -lt "$deadline" ]; do
            set +e
            ./archivar/actualizar.py --max-datasets 1 --max-minutes 300 --max-errores-archivar 3 --map-mode composed
            status=$?
            set -e

            sync_and_push || true

            if [ "$status" -eq 2 ]; then
              echo "No quedan datasets candidatos para archivar."
              break
            fi

            if [ "$status" -ne 0 ]; then
              echo "Un dataset fallo; el estado ya fue guardado y la corrida continua."
            fi
          done
